# Guarantees at least 1 pod is available during voluntary disruptions
# (node drain, cluster upgrade, rolling restart).
# Without this, a node drain can take down all replicas simultaneously
# if the scheduler placed them on the same node.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: my-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-app
