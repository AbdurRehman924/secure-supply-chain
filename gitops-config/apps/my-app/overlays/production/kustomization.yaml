apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base

replicas:
  - name: my-app
    count: 2

# CI pipeline updates this line via: kustomize edit set image
# It always pins an immutable digest — never a mutable tag.
images:
  - name: my-app
    newName: ghcr.io/your-org/my-app
    digest: sha256:replace-me-by-ci
