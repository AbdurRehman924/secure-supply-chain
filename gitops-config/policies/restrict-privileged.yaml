apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-privileged
  annotations:
    policies.kyverno.io/title: Restrict Privileged Workloads
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Enforces Pod Security Standards restricted profile.
      Blocks privileged containers, host namespaces, missing resource limits,
      and mutable image references (latest tag or no digest).
spec:
  validationFailureAction: Enforce
  rules:
    - name: no-privileged
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, argocd, kyverno, cert-manager, ingress-nginx]
      validate:
        message: "Privileged containers, host namespaces, and privilege escalation are not permitted."
        pattern:
          spec:
            hostPID: "false | null"
            hostIPC: "false | null"
            hostNetwork: "false | null"
            containers:
              - securityContext:
                  privileged: "false | null"
                  allowPrivilegeEscalation: "false"
                  runAsNonRoot: true
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL

    - name: require-resource-limits
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, argocd, kyverno, cert-manager, ingress-nginx]
      validate:
        message: "CPU and memory limits are required. Unlimited containers are a noisy-neighbor risk."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"

    # Block mutable image references in production/staging.
    # `:latest` and untagged images are non-deterministic — the same manifest
    # can pull a different image on different nodes or after a registry push.
    # Production deployments must reference an immutable digest.
    - name: block-latest-tag
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [production, staging]
      validate:
        message: "Image tag ':latest' is not permitted. Pin to an immutable digest (sha256:...)."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image }}"
                    operator: NotContains
                    value: "@sha256:"
